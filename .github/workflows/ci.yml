name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check app.py

      - name: Smoke test API
        run: |
          python -c "
          from app import app
          c = app.test_client()
          for path in ['/api/partners', '/api/summary', '/api/by-buy-type', '/api/daily-trends', '/api/deals']:
              r = c.get(path)
              assert r.status_code == 200, f'{path} returned {r.status_code}'
          print('All endpoints OK')
          "

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t campaign-dashboard:ci .
