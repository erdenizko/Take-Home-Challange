<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Campaign performance dashboard showing impression trends, revenue, spend, and deal-level analytics across CTV, Display, Audio, and BVOD channels.">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="Campaign Performance Dashboard">
  <meta property="og:description" content="Track impression trends, revenue, and spend across campaign channels.">
  <meta property="og:type" content="website">
  <title>Campaign Performance Dashboard</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <script>
    // Prevent flash of wrong theme on load
    (() => {
      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</head>

<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200">

  <!-- Header -->
  <header class="px-3 md:px-6 py-3 flex items-center justify-between">
    <img src="/logo.png" alt="Broadlab — Campaign Performance Dashboard" class="h-12 dark:brightness-0 dark:invert" width="165" height="48" fetchpriority="high">
    <theme-toggle></theme-toggle>
  </header>

  <!-- Error banner -->
  <error-banner id="error-banner"></error-banner>

  <noscript>
    <div style="max-width:80rem;margin:2rem auto;padding:1rem 1.5rem;background:#fef2f2;border:1px solid #fecaca;border-radius:0.5rem;color:#b91c1c;font-family:system-ui,sans-serif;">
      This dashboard requires JavaScript to display campaign data. Please enable JavaScript in your browser settings.
    </div>
  </noscript>

  <main class="max-w-7xl mx-auto px-3 py-4 md:px-6 md:py-6 space-y-6">
    <!-- Chart + KPI card -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 space-y-6">
      <div class="flex flex-col gap-4 md:flex-row md:justify-between w-full md:items-center">
        <h1 class="text-xl font-semibold tracking-tighter">Impression Trends</h1>
        <!-- Filters -->
        <div class="flex flex-wrap gap-2 w-full md:flex-nowrap md:gap-3 md:w-auto items-center">
          <filter-chip name="filter" label="Filter by buy type" icon="funnel"
                       placeholder="All Types">
            <option value="">All Types</option>
            <option value="CTV">CTV</option>
            <option value="Display">Display</option>
            <option value="Audio">Audio</option>
            <option value="BVOD">BVOD</option>
          </filter-chip>
          <filter-chip name="partner-filter" label="Filter by supply partner" icon="people"
                       placeholder="All Partners">
            <option value="">All Partners</option>
          </filter-chip>
          <date-range-picker id="date-picker"></date-range-picker>
          <button id="export-btn" type="button" aria-label="Export deals as CSV" class="flex items-center gap-2 bg-brand-dark text-white rounded-full px-4 py-2 text-sm font-medium hover:opacity-90 transition-opacity w-full justify-center md:w-auto">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export
          </button>
        </div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden py-16 text-center">
        <svg class="w-12 h-12 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
        </svg>
        <p class="text-gray-500 text-sm font-medium">No campaign data found for the selected filters.</p>
        <p class="text-gray-300 text-xs mt-1">Try adjusting your filters to see results.</p>
      </div>

      <!-- Dashboard content -->
      <div id="dashboard-content" class="flex flex-col space-y-10">
        <div class="flex flex-col divide-y md:flex-row md:divide-y-0 md:divide-x divide-gray-100 dark:divide-gray-700">
          <!-- Chart -->
          <div class="md:flex-1 md:pr-6">
            <canvas id="trend-chart" height="90"></canvas>
          </div>

          <!-- KPI Cards -->
          <div class="flex flex-row divide-x md:divide-x-0 md:flex-col md:divide-y divide-gray-100 dark:divide-gray-700 pt-4 md:pt-0 md:pl-4 md:w-64 md:shrink-0 md:justify-center text-center md:text-left" id="kpi-cards">
            <kpi-card class="flex-1 pr-4 md:pr-0 md:pb-4 md:flex-auto"
                      label="Impressions" key="impressions"></kpi-card>
            <kpi-card class="flex-1 px-4 md:px-0 md:py-4 md:flex-auto"
                      label="Income" key="revenue"></kpi-card>
            <kpi-card class="flex-1 pl-4 md:pl-0 md:pt-4 md:flex-auto"
                      label="Expense" key="spend"></kpi-card>
          </div>
        </div>

        <!-- Deals Table -->
        <section class="overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-base">
              <thead class="text-gray-800 dark:text-gray-200 text-left hidden md:table-header-group">
                <tr>
                  <th class="px-2 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-sort="deal_id" role="button" tabindex="0">Deal</th>
                  <th class="px-2 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-right" data-sort="impressions" role="button" tabindex="0">Impressions</th>
                  <th class="px-2 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-right" data-sort="spend" role="button" tabindex="0">Spend</th>
                  <th class="px-2 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-right" data-sort="revenue" role="button" tabindex="0">Revenue</th>
                  <th class="px-2 py-2 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-right" data-sort="margin" role="button" tabindex="0">Margin</th>
                </tr>
              </thead>
              <tbody id="deals-body" class="block md:table-row-group"></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </main>
</body>
</html>
