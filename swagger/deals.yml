Deal-level performance.
Returns aggregated metrics per deal, sorted by margin (descending). Supports optional filtering.
---
tags:
  - Deals
parameters:
  - name: buy_type
    in: query
    type: string
    required: false
    enum: [CTV, Display, Audio, BVOD]
    description: Filter by buy type
  - name: supply_partner
    in: query
    type: string
    required: false
    description: Filter by supply partner (see /api/partners for valid values)
  - name: start_date
    in: query
    type: string
    format: date
    required: false
    description: Start date filter (YYYY-MM-DD)
  - name: end_date
    in: query
    type: string
    format: date
    required: false
    description: End date filter (YYYY-MM-DD)
responses:
  200:
    description: Deal-level metrics (sorted by margin descending)
    schema:
      type: array
      items:
        $ref: '#/definitions/Deal'
  400:
    description: Invalid filter value
    schema:
      $ref: '#/definitions/ApiError'
  503:
    description: Campaign data unavailable
    schema:
      $ref: '#/definitions/ApiError'
definitions:
  Deal:
    type: object
    properties:
      deal_id:
        type: string
        example: "DL-1025"
      buy_type:
        type: string
        example: "CTV"
      supply_partner:
        type: string
        example: "Samsung Ads"
      impressions:
        type: integer
        example: 2456789
      spend:
        type: number
        format: float
        example: 8234.56
      revenue:
        type: number
        format: float
        example: 38456.78
      margin:
        type: number
        format: float
        example: 30222.22
